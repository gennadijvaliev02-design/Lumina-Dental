<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Lumina Dental - Premium dental care with expert team and cutting-edge technology. Book your appointment today.">
    <title>Lumina Dental - Premium Dental Care</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        elegant: ['Cormorant Garamond', 'serif'],
                    },
                    colors: {
                        navy: {
                            900: '#0A2540',
                            800: '#0f3459',
                        },
                        primary: {
                            50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4',
                            300: '#5eead4', 400: '#2dd4bf', 500: '#14b8a6',
                            600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a',
                        }
                    },
                    boxShadow: {
                        'soft': '0 20px 40px -15px rgba(10, 37, 64, 0.1)',
                        'premium': '0 25px 50px -12px rgba(10, 37, 64, 0.2)',
                    }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .dark .glass {
            background: rgba(10, 37, 64, 0.85);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #fafaf9 0%, #f5f5f4 100%);
        }
        .dark .gradient-bg {
            background: linear-gradient(135deg, #0A2540 0%, #0f172a 100%);
        }
        
        /* Logo */
        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            color: #0A2540;
            letter-spacing: -0.02em;
        }
        .dark .logo-text { color: #e2e8f0; }
        
        /* Hero Slider */
        .hero-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .hero-slide.active { opacity: 1; }
        .hero-slide img {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scale(1);
            transform-origin: center center;
            transition: transform 8s ease;
        }
        .hero-slide.active img { transform: scale(1.08); }
        
        .slider-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .slider-dot.active {
            background: white;
            width: 32px;
            border-radius: 5px;
        }
        
        /* Premium Card */
        .premium-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px -15px rgba(10, 37, 64, 0.2);
        }
        
        /* Button */
        .btn-premium {
            background: linear-gradient(135deg, #0A2540 0%, #0d9488 100%);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px rgba(10, 37, 64, 0.4);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        
        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeInUp 0.8s ease-out; }
        
        .slot-btn.selected {
            background: linear-gradient(135deg, #0d9488 0%, #14b8a6 100%);
            color: white;
            border-color: transparent;
        }
        .slot-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        /* Telegram iOS fix: keep modal content above overlay and do not blur its own children */
        .booking-modal-panel,
        .booking-modal-body {
            isolation: isolate;
            transform: translateZ(0);
        }

        /* Mobile improvements */
        @media (max-width: 640px) {
            .premium-card h3 {
                font-size: 1.25rem;
            }
            section {
                padding-top: 4rem;
                padding-bottom: 4rem;
            }
            .hero-slide img {
                object-position: center;
            }
        }
    </style>
</head>
<body 
    x-data="dentalApp()" 
    x-init="init()"
    :class="{ 'dark': isDark }"
    class="gradient-bg text-slate-800 dark:text-slate-100 transition-colors duration-500 antialiased"
    @keydown.escape.window="closeBooking(); resultLightbox = null"
>

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-slate-200/50 dark:border-slate-700/50" role="navigation" aria-label="Main navigation">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 sm:h-20">
                <div class="flex items-center space-x-3 cursor-pointer group" @click="scrollTo('hero')">
                    <span class="text-2xl sm:text-3xl transform group-hover:scale-110 transition-transform">🦷</span>
                    <div class="flex flex-col">
                        <span class="text-2xl sm:text-3xl font-elegant font-bold logo-text leading-none tracking-tight">
                            Lumina <span class="text-primary-600">Dental</span>
                        </span>
                        <span class="text-[10px] text-slate-500 dark:text-slate-400 tracking-[0.2em] uppercase mt-1" 
                              x-text="lang === 'ru' ? 'Premium Dentistry' : 'Premium Dentistry'"></span>
                    </div>
                </div>

                <div class="hidden lg:flex items-center space-x-8">
                    <template x-for="item in menuItems" :key="item.id">
                        <a :href="'#' + item.id" 
                           class="text-sm font-medium text-slate-700 dark:text-slate-300 hover:text-primary-600 transition-colors relative group"
                           x-text="lang === 'ru' ? item.labelRu : item.labelEn">
                            <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-primary-600 transition-all group-hover:w-full"></span>
                        </a>
                    </template>
                    
                    <div class="h-6 w-px bg-slate-300 dark:bg-slate-600"></div>
                    
                    <button @click="toggleLang()"
                            class="px-4 py-2 rounded-full border border-slate-300 dark:border-slate-600 text-sm font-semibold hover:bg-slate-100 dark:hover:bg-slate-800 transition-all"
                            :aria-label="lang === 'en' ? 'Switch to Russian' : 'Переключить на английский'">
                        <span x-text="lang === 'en' ? 'RU' : 'EN'"></span>
                    </button>

                    <button @click="toggleTheme()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" :aria-label="isDark ? 'Switch to light mode' : 'Switch to dark mode'">
                        <i data-lucide="sun" x-show="!isDark" class="w-5 h-5 text-amber-500"></i>
                        <i data-lucide="moon" x-show="isDark" class="w-5 h-5 text-primary-400"></i>
                    </button>
                </div>

                <button @click="mobileMenuOpen = !mobileMenuOpen" class="lg:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800" aria-label="Toggle menu">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </div>

        <div x-show="mobileMenuOpen" x-cloak class="lg:hidden glass border-t border-slate-200 dark:border-slate-700" role="dialog" aria-modal="true" aria-label="Mobile menu">
            <div class="px-4 py-6 space-y-3">
                <template x-for="item in menuItems" :key="item.id">
                    <a :href="'#' + item.id" @click="mobileMenuOpen = false"
                       class="block px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 font-medium"
                       x-text="lang === 'ru' ? item.labelRu : item.labelEn"></a>
                </template>
                <div class="flex space-x-3 pt-4 border-t border-slate-200 dark:border-slate-700">
                    <button @click="toggleLang()" class="flex-1 py-3 rounded-xl border border-slate-300 dark:border-slate-600 font-medium">
                        <span x-text="lang === 'en' ? 'RU' : 'EN'"></span>
                    </button>
                    <button @click="toggleTheme()" class="flex-1 py-3 rounded-xl border border-slate-300 dark:border-slate-600 font-medium">
                        <span x-text="isDark ? (lang === 'ru' ? '☀️ Светлая' : '☀️ Light') : (lang === 'ru' ? '🌙 Тёмная' : '🌙 Dark')"></span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section with Slider -->
    <section id="hero" class="relative min-h-[100dvh] flex items-center pt-20 overflow-hidden" aria-label="Hero section">
        <!-- Slider Background -->
        <div class="absolute inset-0 z-0">
            <template x-for="(slide, index) in heroSlides" :key="index">
                <div class="hero-slide" :class="{ 'active': currentHeroSlide === index }">
                    <div class="absolute inset-0 bg-gradient-to-r from-navy-900/90 via-navy-900/70 to-navy-900/40 z-10"></div>
                    <img :src="slide.image" :alt="slide.title">
                </div>
            </template>
        </div>

        <div class="relative z-20 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
            <div class="max-w-3xl animate-fade-up">
                <div class="inline-flex items-center px-5 py-2.5 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-white text-sm font-medium mb-8">
                    <i data-lucide="award" class="w-4 h-4 mr-2 text-primary-400"></i>
                    <span x-text="lang === 'ru' ? '№1 Клиника в городе' : '#1 Dental Clinic in the City'"></span>
                </div>
                
                <h1 class="font-elegant text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-bold text-white leading-[1.05] mb-6">
                    <span x-text="lang === 'ru' ? 'Создаём' : 'Creating'"></span><br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary-300 to-teal-200" 
                          x-text="lang === 'ru' ? 'идеальные улыбки' : 'Perfect Smiles'"></span><br>
                    <span class="text-4xl md:text-5xl lg:text-6xl font-light italic opacity-90" 
                          x-text="lang === 'ru' ? 'с 2010 года' : 'Since 2010'"></span>
                </h1>
                
                <p class="text-lg sm:text-xl text-slate-200 mb-10 max-w-2xl leading-relaxed font-light"
                   x-text="lang === 'ru' ? 'Премиальная стоматология с использованием передовых технологий и индивидуальным подходом к каждому пациенту' : 'Premium dentistry using cutting-edge technology and individual approach to every patient'">
                </p>

                <div class="flex flex-col sm:flex-row gap-5">
                    <button @click="openBooking()"
                            class="btn-premium px-8 py-4 sm:px-10 sm:py-5 text-white rounded-full font-semibold text-base sm:text-lg shadow-2xl flex items-center justify-center group min-h-[52px]"
                            aria-label="Book appointment">
                        <i data-lucide="calendar" class="w-6 h-6 mr-3 group-hover:rotate-12 transition-transform"></i>
                        <span x-text="lang === 'ru' ? 'Записаться на приём' : 'Book Appointment'"></span>
                    </button>
                    <button @click="scrollTo('tips')"
                            class="px-8 py-4 sm:px-10 sm:py-5 border-2 border-white/30 backdrop-blur-sm text-white rounded-full font-semibold text-base sm:text-lg hover:bg-white/10 transition-all flex items-center justify-center min-h-[52px]"
                            aria-label="View tips">
                        <span x-text="lang === 'ru' ? 'Советы стоматологов' : 'Dentist Tips'"></span>
                        <i data-lucide="arrow-down" class="w-5 h-5 ml-2 animate-bounce"></i>
                    </button>
                </div>

                <div class="grid grid-cols-3 gap-4 sm:gap-8 mt-16 pt-8 border-t border-white/20">
                    <div>
                        <div class="text-3xl sm:text-4xl font-elegant font-bold text-primary-400">15+</div>
                        <div class="text-xs sm:text-sm text-slate-300 mt-1" x-text="lang === 'ru' ? 'Лет опыта' : 'Years Experience'"></div>
                    </div>
                    <div>
                        <div class="text-3xl sm:text-4xl font-elegant font-bold text-primary-400">5000+</div>
                        <div class="text-xs sm:text-sm text-slate-300 mt-1" x-text="lang === 'ru' ? 'Пациентов' : 'Happy Patients'"></div>
                    </div>
                    <div>
                        <div class="text-3xl sm:text-4xl font-elegant font-bold text-primary-400">98%</div>
                        <div class="text-xs sm:text-sm text-slate-300 mt-1" x-text="lang === 'ru' ? 'Успешных случаев' : 'Success Rate'"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Slider Controls -->
        <div class="absolute bottom-10 left-0 right-0 z-30 flex justify-center">
            <div class="flex gap-3 items-center">
                <template x-for="(slide, index) in heroSlides" :key="index">
                    <button @click="goToHeroSlide(index)" class="slider-dot" :class="{ 'active': currentHeroSlide === index }" :aria-label="'Slide ' + (index + 1)"></button>
                </template>
            </div>
        </div>

        <button @click="prevHeroSlide()" class="absolute left-4 md:left-8 top-1/2 -translate-y-1/2 z-30 w-12 h-12 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-white flex items-center justify-center hover:bg-white/20 transition-all" aria-label="Previous slide">
            <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <button @click="nextHeroSlide()" class="absolute right-4 md:right-8 top-1/2 -translate-y-1/2 z-30 w-12 h-12 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-white flex items-center justify-center hover:bg-white/20 transition-all" aria-label="Next slide">
            <i data-lucide="chevron-right" class="w-6 h-6"></i>
        </button>
    </section>

    <!-- Services -->
    <section id="services" class="py-24 bg-white dark:bg-navy-900" aria-label="Services">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center max-w-3xl mx-auto mb-16">
                <span class="text-primary-600 font-semibold tracking-[0.2em] uppercase text-sm mb-4 block" x-text="lang === 'ru' ? 'Наши услуги' : 'Our Services'"></span>
                <h2 class="font-elegant text-5xl md:text-6xl font-bold mb-6 text-navy-900 dark:text-white" 
                    x-text="lang === 'ru' ? 'Комплексная стоматология' : 'Comprehensive Care'"></h2>
                <p class="text-lg text-slate-600 dark:text-slate-400" 
                   x-text="lang === 'ru' ? 'Полный спектр стоматологических услуг премиум-класса' : 'Full range of premium dental services'">
                </p>
            </div>

            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                <template x-for="service in services" :key="service.id">
                    <div class="premium-card group bg-slate-50 dark:bg-slate-800/50 rounded-3xl p-6 sm:p-8 md:p-10 border border-slate-100 dark:border-slate-700 cursor-pointer" @click="selectService(service)">
                        <div class="w-16 h-16 bg-gradient-to-br from-primary-500 to-teal-600 rounded-2xl flex items-center justify-center mb-8 group-hover:scale-110 transition-transform shadow-lg shadow-primary-500/30">
                            <i :data-lucide="service.icon" class="w-8 h-8 text-white"></i>
                        </div>
                        <h3 class="font-elegant text-2xl font-bold mb-4 text-navy-900 dark:text-white" x-text="lang === 'ru' ? service.nameRu : service.nameEn"></h3>
                        <p class="text-slate-600 dark:text-slate-400 mb-6 leading-relaxed" x-text="lang === 'ru' ? service.descRu : service.descEn"></p>
                        <div class="flex items-center justify-between pt-6 border-t border-slate-200 dark:border-slate-700">
                            <span class="text-primary-600 font-bold text-xl" x-text="service.price"></span>
                            <button class="w-12 h-12 rounded-full bg-navy-900 dark:bg-primary-600 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all" aria-label="Select service">
                                <i data-lucide="arrow-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </section>

    <!-- Real Results (Before & After) -->
    <section id="results" class="py-24 bg-gradient-to-b from-white to-slate-50 dark:from-navy-900 dark:to-slate-900" aria-label="Real patient results">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center max-w-3xl mx-auto mb-16">
                <span class="text-primary-600 font-semibold tracking-[0.2em] uppercase text-sm mb-4 block" x-text="lang === 'ru' ? 'Реальные случаи' : 'Real Cases'"></span>
                <h2 class="font-elegant text-5xl md:text-6xl font-bold mb-6 text-navy-900 dark:text-white"
                    x-text="lang === 'ru' ? 'До и после' : 'Before & After'"></h2>
                <p class="text-lg text-slate-600 dark:text-slate-400"
                   x-text="lang === 'ru' ? 'Настоящие результаты наших пациентов' : 'Genuine results from our patients'">
                </p>
            </div>

            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                <template x-for="result in results" :key="result.id">
                    <div class="group bg-white dark:bg-slate-800/50 rounded-3xl overflow-hidden border border-slate-100 dark:border-slate-700 shadow-soft hover:shadow-premium transition-all duration-500 cursor-pointer"
                         @click="resultLightbox = result">
                        <div class="relative aspect-[4/3] bg-slate-100 dark:bg-slate-900 overflow-hidden flex items-center justify-center p-2">
                            <img :src="result.image" :alt="result.titleEn"
                                 class="max-w-full max-h-full object-contain transition-transform duration-700 group-hover:scale-105">
                            <span class="absolute top-4 left-4 px-3 py-1.5 rounded-full bg-navy-900/90 backdrop-blur-sm text-white text-xs font-bold uppercase tracking-wider flex items-center gap-1.5">
                                <span x-text="result.icon"></span>
                                <span x-text="lang === 'ru' ? result.categoryRu : result.categoryEn"></span>
                            </span>
                            <div class="absolute inset-0 bg-gradient-to-t from-navy-900/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end justify-center pb-4">
                                <span class="text-white text-xs font-semibold flex items-center gap-1.5">
                                    <i data-lucide="zoom-in" class="w-4 h-4"></i>
                                    <span x-text="lang === 'ru' ? 'Увеличить' : 'View larger'"></span>
                                </span>
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="font-elegant text-xl font-bold mb-2 text-navy-900 dark:text-white" x-text="lang === 'ru' ? result.titleRu : result.titleEn"></h3>
                            <p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed" x-text="lang === 'ru' ? result.descRu : result.descEn"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Lightbox -->
        <div x-show="resultLightbox" x-cloak
             x-transition:enter="ease-out duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
             class="fixed inset-0 z-[70] flex items-center justify-center p-4 sm:p-8 bg-navy-900/95 backdrop-blur-sm"
             @click="resultLightbox = null" role="dialog" aria-modal="true" aria-label="Enlarged result photo">
            <button @click.stop="resultLightbox = null" class="absolute top-5 right-5 sm:top-8 sm:right-8 w-11 h-11 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition-colors" aria-label="Close">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <div class="max-w-3xl w-full" @click.stop>
                <img :src="resultLightbox?.image" :alt="resultLightbox?.titleEn" class="w-full max-h-[70vh] object-contain rounded-2xl shadow-2xl">
                <div class="text-center mt-5">
                    <span class="px-3 py-1.5 rounded-full bg-primary-600 text-white text-xs font-bold uppercase tracking-wider" x-text="lang === 'ru' ? resultLightbox?.categoryRu : resultLightbox?.categoryEn"></span>
                    <h3 class="font-elegant text-2xl font-bold text-white mt-3" x-text="lang === 'ru' ? resultLightbox?.titleRu : resultLightbox?.titleEn"></h3>
                </div>
            </div>
        </div>
    </section>

    <!-- Dentist Tips Section (replaces Before/After Gallery) -->
    <section id="tips" class="py-24 bg-gradient-to-b from-slate-50 to-white dark:from-navy-900 dark:to-slate-900" aria-label="Dentist tips">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center max-w-4xl mx-auto mb-16">
                <span class="text-primary-600 font-semibold tracking-[0.2em] uppercase text-sm mb-4 block" x-text="lang === 'ru' ? 'Полезные советы' : 'Useful Tips'"></span>
                <h2 class="font-elegant text-5xl md:text-6xl lg:text-7xl font-bold mb-6 text-navy-900 dark:text-white" 
                    x-text="lang === 'ru' ? 'Советы от стоматологов' : 'Tips from Dentists'"></h2>
                <p class="text-xl text-slate-600 dark:text-slate-400" 
                   x-text="lang === 'ru' ? 'Простые правила для здоровья ваших зубов' : 'Simple rules for healthy teeth'">
                </p>
            </div>

            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <template x-for="tip in tips" :key="tip.id">
                    <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 shadow-soft hover:shadow-premium transition-all duration-500 border border-slate-100 dark:border-slate-700 flex flex-col items-start">
                        <div class="w-14 h-14 bg-gradient-to-br from-primary-500 to-teal-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-primary-500/30">
                            <i :data-lucide="tip.icon" class="w-7 h-7 text-white"></i>
                        </div>

                timeSlots: ['09:00', '09:30', '10:00', '10:30', '11:00', '11:30', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30'],
                bookedSlots: ['10:00', '14:30'], // placeholder

                get bookingSteps() {
                    return this.lang === 'ru' 
                        ? ['Услуга', 'Врач', 'Дата и время', 'Ваши данные', 'Готово']
                        : ['Service', 'Doctor', 'Date & Time', 'Your Info', 'Done'];
                },
                get weekDays() {
                    return this.lang === 'ru' ? ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'] : ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su'];
                },

                init() {
                    if (window.Telegram && window.Telegram.WebApp) {
                        const tg = window.Telegram.WebApp;
                        tg.ready();
                        tg.expand();
                        this.isDark = tg.colorScheme === 'dark';
                        tg.MainButton.setText('Book Now');
                        tg.MainButton.onClick(() => this.openBooking());
                    }
                    
                    // Initial icon rendering
                    this.$nextTick(() => lucide.createIcons());
                    
                    // Auto-slide hero
                    this.startHeroSlider();
                    
                    // Watch for DOM changes to re-render icons
                    this.$watch('showBooking', () => { this.$nextTick(() => lucide.createIcons()); });
                    this.$watch('bookingStep', () => { this.$nextTick(() => lucide.createIcons()); });
                    this.$watch('testimonialIndex', () => { this.$nextTick(() => lucide.createIcons()); });
                },

                startHeroSlider() {
                    this.heroSlideInterval = setInterval(() => {
                        this.currentHeroSlide = (this.currentHeroSlide + 1) % this.heroSlides.length;
                    }, 5000);
                },

                goToHeroSlide(index) {
                    this.currentHeroSlide = index;
                    clearInterval(this.heroSlideInterval);
                    this.startHeroSlider();
                },
                nextHeroSlide() { this.goToHeroSlide((this.currentHeroSlide + 1) % this.heroSlides.length); },
                prevHeroSlide() { this.goToHeroSlide((this.currentHeroSlide - 1 + this.heroSlides.length) % this.heroSlides.length); },

                toggleTheme() { this.isDark = !this.isDark; },
                toggleLang() { this.lang = this.lang === 'en' ? 'ru' : 'en'; },
                scrollTo(id) { 
                    const el = document.getElementById(id);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth' });
                        if (id === 'tips' && !this.menuItems.some(m => m.id === 'tips')) {
                            // Tips is already in menuItems, no need to add.
                        }
                    }
                },

                openBooking(service = null, doctor = null) {
                    // Preserve previously selected service/doctor if not overriding
                    if (service) this.bookingData.service = service;
                    if (doctor) this.bookingData.doctor = doctor;
                    
                    this.showBooking = true;
                    this.bookingError = '';
                    if (!this.bookingData.service && !this.bookingData.doctor) {
                        this.bookingStep = 1;
                    } else if (this.bookingData.service && !this.bookingData.doctor) {
                        this.bookingStep = 2;
                    } else if (this.bookingData.service && this.bookingData.doctor && !this.selectedDate) {
                        this.bookingStep = 3;
                    } else {
                        this.bookingStep = 1; // fallback
                    }
                    document.body.style.overflow = 'hidden';
                    this.$nextTick(() => lucide.createIcons());
                },
                closeBooking() {
                    this.showBooking = false;
                    document.body.style.overflow = '';
                },
                nextStep() { 
                    if (this.bookingStep < 5) {
                        this.bookingStep++;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },
                prevStep() { 
                    if (this.bookingStep > 1) {
                        this.bookingStep--;
                        this.$nextTick(() => lucide.createIcons());
                    }
                },
                selectService(service) {
                    this.bookingData.service = service;
                    this.openBooking(service);
                },
                selectDoctor(doctor) {
                    this.bookingData.doctor = doctor;
                    if (this.bookingData.service) {
                        // If service already selected, jump to step 3
                        this.bookingStep = 3;
                        this.openBooking(this.bookingData.service, doctor);
                    } else {
                        this.openBooking(null, doctor);
                    }
                },

                get calendarDays() {
                    const year = this.currentDate.getFullYear();
                    const month = this.currentDate.getMonth();
                    const firstDay = new Date(year, month, 1);
                    const lastDay = new Date(year, month + 1, 0);
                    const daysInMonth = lastDay.getDate();
                    const startingDay = firstDay.getDay() || 7;
                    const days = [];
                    for (let i = 1; i < startingDay; i++) days.push(null);
                    for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));
                    return days;
                },

                get currentMonthYear() {
                    const months = this.lang === 'ru' 
                        ? ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь']
                        : ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
                    return `${months[this.currentDate.getMonth()]} ${this.currentDate.getFullYear()}`;
                },

                get today() {
                    const t = new Date(); t.setHours(0, 0, 0, 0); return t;
                },

                changeMonth(delta) { 
                    const newDate = new Date(this.currentDate);
                    newDate.setMonth(newDate.getMonth() + delta);
                    this.currentDate = newDate;
                },
                selectDate(date) { 
                    if (date && date >= this.today) { 
                        this.selectedDate = date; 
                        this.bookingData.time = null;
                        // On mobile Telegram WebView the time buttons are below the fold.
                        // After choosing a date, scroll the modal content to the available time block.
                        this.$nextTick(() => {
                            const timeBlock = document.getElementById('availableTimeBlock');
                            if (timeBlock) {
                                timeBlock.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }
                            lucide.createIcons();
                        });
                    }
                },
                formatDate(date) {
                    if (!date) return '';
                    return date.toLocaleDateString(this.lang === 'ru' ? 'ru-RU' : 'en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                },
                isSlotBooked(slot) { 
                    return this.bookedSlots.includes(slot);
                },

                submitBooking() {
                    // Simple validation
                    this.bookingError = '';
                    if (!this.bookingData.name.trim()) {
                        this.bookingError = this.lang === 'ru' ? 'Пожалуйста, введите имя' : 'Please enter your name';
                        return;
                    }
                    if (!this.bookingData.phone.trim()) {
                        this.bookingError = this.lang === 'ru' ? 'Пожалуйста, введите телефон' : 'Please enter your phone number';
                        return;
                    }
                    
                    // Proceed
                    setTimeout(() => {
                        this.bookingStep = 5;
                        this.$nextTick(() => lucide.createIcons());
                        if (window.Telegram && window.Telegram.WebApp) {
                            window.Telegram.WebApp.sendData(JSON.stringify({
                                action: 'booking',
                                data: { ...this.bookingData, date: this.formatDate(this.selectedDate) }
                            }));
                        }
                    }, 300);
                },

                addToCalendar() {
                    if (!this.selectedDate || !this.bookingData.time) return;
                    const [h, m] = this.bookingData.time.split(':').map(Number);
                    const start = new Date(this.selectedDate);
                    start.setHours(h, m, 0, 0);
                    const end = new Date(start.getTime() + 60 * 60 * 1000);
                    
                    // Format as local time without Z
                    const formatLocal = (d) => {
                        const year = d.getFullYear();
                        const month = String(d.getMonth() + 1).padStart(2, '0');
                        const day = String(d.getDate()).padStart(2, '0');
                        const hours = String(d.getHours()).padStart(2, '0');
                        const mins = String(d.getMinutes()).padStart(2, '0');
                        const secs = String(d.getSeconds()).padStart(2, '0');
                        return `${year}${month}${day}T${hours}${mins}${secs}`;
                    };
                    
                    const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${formatLocal(start)}\nDTEND:${formatLocal(end)}\nSUMMARY:Dental Appointment - ${this.bookingData.service?.nameEn || 'Service'}\nEND:VEVENT\nEND:VCALENDAR`;
                    const blob = new Blob([ics], { type: 'text/calendar' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'appointment.ics'; a.click();
                    URL.revokeObjectURL(url);
                },

                prevTestimonial() { if (this.testimonialIndex > 0) this.testimonialIndex--; },
                nextTestimonial() { if (this.testimonialIndex < this.testimonials.length - 1) this.testimonialIndex++; }
            }
        }
    </script>
</body>
